<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫码拨号挪车</title>
    <!-- 引入二维码引擎 -->
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <!-- 引入高清截图库 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --orange-bg: #fff7ed;
            --orange-deep: #431407;
            --orange-primary: #ea580c;
            --orange-accent: #f97316;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

        body {
            background-color: #fef3c7;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* 生成器控制台 */
        .controls {
            background: #fff; padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            width: 100%; max-width: 400px; margin-bottom: 30px;
            text-align: center; border: 1px solid #fde68a;
        }

        input {
            width: 100%; padding: 16px; border: 2px solid #fff7ed; border-radius: 14px;
            font-size: 16px; outline: none; transition: 0.3s; margin-bottom: 20px;
            background: #fffcf0; color: var(--orange-deep); font-weight: 600;
        }
        input:focus { border-color: var(--orange-accent); background: #fff; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 15px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-gen { background: var(--orange-primary); color: white; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2); }
        .btn-export { background: var(--orange-deep); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 挪车卡容器 - 打印实体 */
        .parking-card-container {
            padding: 15px; background: white; border-radius: 40px;
            box-shadow: 0 40px 80px -15px rgba(67, 20, 7, 0.15);
        }

        .parking-card {
            width: 340px; height: 500px;
            background: var(--orange-bg);
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: 45px 20px;
            border: 10px solid white;
        }

        /* 背景装饰纹理 */
        .parking-card::before {
            content: ""; position: absolute; bottom: -60px; left: -60px;
            width: 220px; height: 220px; background: rgba(249, 115, 22, 0.06);
            border-radius: 50%;
        }

        .card-header { text-align: center; z-index: 1; }
        .card-header h2 {
            font-size: 34px; font-weight: 900; color: var(--orange-deep);
            letter-spacing: -1px; margin-bottom: 5px;
        }
        .card-header p { font-size: 13px; color: var(--orange-primary); font-weight: 800; opacity: 0.7; letter-spacing: 2px; }

        .qr-frame {
            background: white; padding: 18px; border-radius: 28px;
            margin: 40px 0; box-shadow: 0 15px 40px rgba(234, 88, 12, 0.12);
            position: relative; z-index: 1;
        }
        #qr-canvas-target { line-height: 0; }

        .card-footer { text-align: center; z-index: 1; }
        .slogan {
            font-size: 20px; font-weight: 900; color: var(--orange-deep);
            margin-bottom: 5px; display: flex; align-items: center; gap: 8px; justify-content: center;
        }
        .slogan svg { color: var(--orange-primary); }
        .sub-text { font-size: 13px; color: var(--orange-primary); font-weight: 700; opacity: 0.6; }

        /* 手机拨号页 UI */
        #mobile-view { display: none; text-align: center; padding: 40px 20px; }
        .call-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 22px; background: #10b981;
            color: white; border-radius: 20px; font-size: 20px; font-weight: 800;
            text-decoration: none; margin-top: 35px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <div id="generator-ui">
        <!-- 控制台 -->
        <div class="controls">
            <h3 style="margin-bottom:15px; color:var(--orange-deep);">扫码拨号挪车生成器</h3>
            <input type="tel" id="input-phone" placeholder="输入接收拨打的手机号" maxlength="11">
            <div class="btn-row">
                <button class="btn btn-gen" onclick="generateParkingCard()">预览卡片</button>
                <button class="btn btn-export" onclick="exportHDImage()">下载高清图</button>
            </div>
            <p style="font-size:11px; color:#92400e; margin-top:15px; opacity:0.7;">支持微信扫码识别 · 保护车主真实号码</p>
        </div>

        <!-- 挪车卡预览区 -->
        <div class="parking-card-container" id="capture-area">
            <div class="parking-card">
                <div class="card-header">
                    <h2>扫码拨号挪车</h2>
                    <p>PLEASE CALL ME</p>
                </div>

                <div class="qr-frame">
                    <div id="qr-canvas-target"></div>
                </div>

                <div class="card-footer">
                    <div class="slogan">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0IDI-Y2FsbC1hY3Rpb24iPuehru认拨打</a>
                        <p class="slogan">拨号挪车 · 隐私保护</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 手机端扫码后的页面 -->
    <div id="mobile-view" class="parking-card-container">
        <div class="card-header">
            <h2 style="font-size:26px; color:#ea580c;">扫码拨号挪车</h2>
            <p>正在为您转接车主号码</p>
        </div>
        <div style="font-size:42px; font-weight:900; margin:45px 0; color:#431407; letter-spacing:1px;" id="mask-num">138 **** 0000</div>
        <a href="" id="dial-link" class="call-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0IDI-Y2FsbC1hY3Rpb24iPuehru认拨打</a>
            立刻拨号呼叫
        </a>
        <p style="font-size:12px; color:#92400e; margin-top:25px; font-weight:600;">ENCRYPTED CONNECTION</p>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const p = query.get('phone');

        if(p) {
            document.getElementById('generator-ui').style.display = 'none';
            document.getElementById('mobile-view').style.display = 'block';
            document.getElementById('mask-num').innerText = p.replace(/(\d{3})\d{4}(\d{4})/, '$1 **** $2');
            document.getElementById('dial-link').href = 'tel:' + p;
        }

        let qrCode = null;

        function generateParkingCard() {
            const phone = document.getElementById('input-phone').value.trim();
            if(!/^1[3-9]\d{9}$/.test(phone)) return alert('请输入正确的11位手机号');

            const container = document.getElementById('qr-canvas-target');
            container.innerHTML = '';

            const current = window.location.origin + window.location.pathname;
            const link = `${current}?phone=${phone}`;

            qrCode = new QRCodeStyling({
                width: 220,
                height: 220,
                data: link,
                image: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjZWE1ODBjIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTE5IDE4SDRhMiAyIDAgMCAwLTIgMnYxYTEgMSAwIDAgMCAxIDFoMThhMSAxIDAgMCAwIDEtMXYtMWEyIDIgMCAwIDAtMi0yek03IDE0LjhWMTFhMSAxIDAgMCAxIDEtMWg4YTEgMSAwIDAgMSAxIDF2My44YTIgMiAwIDAgMS0uNjIgMS40MkwxNSAxN2gtNmwtMS4zOC0uNzhBMiAyIDAgMCAxIDcgMTQuOHpNMjAgMTFWN2EyIDIgMCAwIDAtMi0ySDRhMiAyIDAgMCAwLTIgMnY0TDIgMTF2N2gydi0zaDE2djNoMnYtN2wtMi0weiI+PC9wYXRoPjwvc3ZnPg==",
                dotsOptions: {
                    type: "classy-rounded",
                    color: "#431407"
                },
                cornersSquareOptions: {
                    type: "extra-rounded",
                    color: "#ea580c"
                },
                imageOptions: { margin: 5, imageSize: 0.45 }
            });

            qrCode.append(container);
        }

        function exportHDImage() {
            const area = document.getElementById('capture-area');
            const phone = document.getElementById('input-phone').value;
            if(!phone) return alert('请先生成卡片');

            html2canvas(area, {
                scale: 4, // 保持4倍高清
                backgroundColor: null,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `扫码拨号挪车_${phone}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
