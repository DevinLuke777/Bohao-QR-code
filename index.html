<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一键拨号 - 高端美化版</title>
    <!-- 引入强大的 Awesome-qr 库 -->
    <script src="https://cdn.jsdelivr.net/npm/awesome-qr@2.1.5-rc.0/dist/awesome-qr.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #2563eb 100%);
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .card {
            width: 100%; max-width: 440px; background: var(--card-bg);
            border-radius: 32px; padding: 35px;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 30px; }
        .icon-box {
            width: 60px; height: 60px; background: var(--primary-gradient);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 15px; color: white; box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        }

        h1 { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 5px; }

        .input-area { margin-bottom: 25px; }
        .label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: block; color: #4b5563; }
        input {
            width: 100%; padding: 16px; border: 2px solid #f3f4f6; border-radius: 16px;
            font-size: 18px; outline: none; transition: 0.3s; background: #f9fafb;
        }
        input:focus { border-color: #6366f1; background: white; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-group { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 30px; }
        button {
            padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer;
            transition: 0.3s; border: none; font-size: 15px;
        }
        .btn-secondary { background: #f3f4f6; color: #4b5563; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* 二维码展示区 - 更有质感 */
        .qr-container {
            background: #f9fafb; border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 250px; justify-content: center;
            border: 2px dashed #e5e7eb; position: relative;
        }
        #qr-result { max-width: 220px; width: 100%; border-radius: 15px; display: none; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .qr-placeholder { text-align: center; color: #9ca3af; font-size: 14px; }

        /* 手机确认拨号模式 */
        #dial-mode { display: none; text-align: center; }
        .phone-display { font-size: 36px; font-weight: 800; margin: 30px 0; color: #111827; }
        .btn-call {
            display: flex; width: 100%; padding: 20px; background: #10b981;
            color: white; border-radius: 20px; font-size: 20px; font-weight: 800;
            text-decoration: none; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <div class="card" id="gen-mode">
        <header>
            <div class="icon-box">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <h1>高端拨号码生成</h1>
            <p class="subtitle">设计感十足，支持微信扫码</p>
        </header>

        <div class="input-area">
            <span class="label">接收拨打的手机号</span>
            <input type="tel" id="phone-input" placeholder="输入11位手机号" maxlength="11">
        </div>

        <div class="btn-group">
            <button class="btn-secondary" onclick="location.reload()">重置</button>
            <button class="btn-primary" onclick="generatePremiumQR()">生成精美二维码</button>
        </div>

        <div class="qr-container">
            <img id="qr-result" src="" alt="二维码">
            <div id="qr-loading" style="display:none; color:#6366f1; font-weight:bold;">正在绘制美化中...</div>
            <div class="qr-placeholder" id="placeholder">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h.01M17 7h.01M7 17h.01M12 7v10M7 12h10"/></svg>
                <p style="margin-top:10px">点击上方按钮生成</p>
            </div>
        </div>
    </div>

    <!-- 手机拨号模式 -->
    <div class="card" id="dial-mode">
        <div class="icon-box" style="background:#10b981">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <p style="color:#6b7280; font-weight:600">确认呼叫号码</p>
        <div class="phone-display" id="display-num">138 **** 8888</div>
        <a href="" id="call-link" class="btn-call">立刻拨打</a>
        <p style="margin-top:20px; font-size:12px; color:#9ca3af">提示：点击后将唤起系统拨号盘</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const p = params.get('phone');

        if(p) {
            document.getElementById('gen-mode').style.display = 'none';
            document.getElementById('dial-mode').style.display = 'block';
            // 隐私保护显示：隐藏中间4位
            document.getElementById('display-num').innerText = p.replace(/(\d{3})\d{4}(\d{4})/, '$1 **** $2');
            document.getElementById('call-link').href = 'tel:' + p;
        }

        async function generatePremiumQR() {
            const phone = document.getElementById('phone-input').value.trim();
            if(!/^1[3-9]\d{9}$/.test(phone)) return alert('请输入正确号码');

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('qr-loading').style.display = 'block';
            document.getElementById('qr-result').style.display = 'none';

            const currentUrl = window.location.origin + window.location.pathname;
            const finalUrl = `${currentUrl}?phone=${phone}`;

            // 使用 Awesome-qr 生成美化后的二维码
            try {
                const buffer = await new AwesomeQR.AwesomeQR({
                    text: finalUrl,
                    size: 800,
                    margin: 20,
                    maskPattern: 1,
                    colorDark: '#2563eb', // 深蓝色
                    colorLight: '#ffffff',
                    typeNumber: 0,
                    correctLevel: AwesomeQR.QRErrorCorrectLevel.H,
                    // 关键美化参数：圆角点阵
                    components: {
                        data: { scale: 0.8 },
                        timing: { scale: 0.8, protect: true },
                        alignment: { scale: 0.8, protect: true },
                        cornerAlignment: { scale: 0.8, protect: true },
                        // 设置寻像图形（那三个大方块）为圆角
                        location: { scale: 1.0 }
                    },
                    // 中央 Logo
                    logoImage: 'https://api.iconify.design/solar:phone-bold.svg?color=%232563eb',
                    logoScale: 0.25,
                    logoMargin: 5,
                    logoCornerRadius: 8
                }).draw();

                document.getElementById('qr-result').src = buffer;
                document.getElementById('qr-result').style.display = 'block';
                document.getElementById('qr-loading').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert('生成失败');
            }
        }
    </script>
</body>
</html>
